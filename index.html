<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says - Launcher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <div id="menu">
            <h1 id="title">SIMON SAYS</h1>
            <p id="subtitle">Test your memory...</p>

            <!-- Text input: Player name -->
            <div id="name-section">
                <label for="player-name">Player Name:</label>
                <div id="name-row">
                    <input type="text" id="player-name" maxlength="15" placeholder="Enter name">
                    <button id="lock-btn">🔓</button>
                </div>
                <div id="password-section" style="display: none;">
                    <input type="password" id="password-input" maxlength="20" placeholder="Set a password">
                    <button id="save-password">Save</button>
                </div>
            </div>

            <!-- Dropdown: Difficulty -->
            <div id="settings-row">
                <label for="difficulty-select">Difficulty:</label>
                <select id="difficulty-select">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                    <option value="special">Special</option>
                </select>
            </div>

            <!-- Radio buttons: Color scheme -->
            <div id="color-scheme-selector">
                <span id="scheme-label">Theme:</span>
                <label class="radio-label"><input type="radio" name="scheme" value="classic" checked> Classic</label>
                <label class="radio-label"><input type="radio" name="scheme" value="neon"> Neon</label>
                <label class="radio-label"><input type="radio" name="scheme" value="pastel"> Pastel</label>
            </div>

            <!-- Checkbox: Timer mode -->
            <div id="mode-selector">
                <label class="mode-toggle">
                    <input type="checkbox" id="timer-toggle">
                    <span id="toggle-label">Timer Mode</span>
                </label>
            </div>

            <!-- Volume -->
            <div id="volume-section">
                <label>Volume: <span id="volume-label">70%</span></label>
                <input type="range" id="volume-slider" min="0" max="100" value="70">
                <button id="mute-btn">🔊</button>
            </div>

            <!-- Buttons: Start, Reset, Save, Load -->
            <div id="action-buttons">
                <button id="start-btn">START</button>
                <button id="reset-settings-btn">Reset</button>
                <button id="save-settings-btn">Save</button>
                <button id="load-settings-btn">Load</button>
            </div>

            <div id="score-section">
                <p id="high-score">High Score: <span id="high-score-value">0</span></p>
                <button id="leaderboard-btn">Leaderboard</button>
            </div>
        </div>

        <!-- Leaderboard -->
        <div id="leaderboard-modal" style="display: none;">
            <div id="leaderboard-content">
                <h2>Leaderboard</h2>
                <div id="leaderboard-tabs">
                    <button class="lb-tab" data-lb-difficulty="easy">Easy</button>
                    <button class="lb-tab" data-lb-difficulty="normal">Normal</button>
                    <button class="lb-tab" data-lb-difficulty="hard">Hard</button>
                    <button class="lb-tab" data-lb-difficulty="special">Special</button>
                </div>
                <div id="leaderboard-entries"></div>
                <button id="close-leaderboard">Close</button>
            </div>
        </div>

        <!-- Feedback Button -->
        <button id="feedback-btn">Feedback</button>

        <!-- Feedback Modal -->
        <div id="feedback-modal" style="display: none;">
            <div id="feedback-content">
                <h2>Send Feedback</h2>
                <form id="feedback-form">
                    <label for="feedback-name">Your Name:</label>
                    <input type="text" id="feedback-name" maxlength="15" placeholder="Enter name">
                    <label for="feedback-text">Feedback:</label>
                    <textarea id="feedback-text" rows="4" placeholder="Tell us what you think..."></textarea>
                </form>
                <div id="feedback-buttons">
                    <button id="submit-feedback">Submit</button>
                    <button id="close-feedback">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Admin Button -->
        <button id="admin-btn">Admin</button>

        <!-- Admin Login Modal -->
        <div id="admin-login-modal" style="display: none;">
            <div id="admin-login-content">
                <h2>Admin Login</h2>
                <input type="text" id="admin-username" placeholder="Username">
                <input type="password" id="admin-password" placeholder="Password">
                <div id="admin-login-buttons">
                    <button id="admin-login-btn">Login</button>
                    <button id="close-admin-login">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Admin Panel -->
        <div id="admin-panel" style="display: none;">
            <div id="admin-content">
                <h2>Admin Panel</h2>
                <div id="admin-tabs">
                    <button class="admin-tab active" data-admin-tab="leaderboard">Leaderboard</button>
                    <button class="admin-tab" data-admin-tab="feedback">Feedback</button>
                </div>
                <div id="admin-leaderboard-view">
                    <div id="admin-lb-tabs">
                        <button class="admin-lb-tab" data-admin-lb="easy">Easy</button>
                        <button class="admin-lb-tab" data-admin-lb="normal">Normal</button>
                        <button class="admin-lb-tab" data-admin-lb="hard">Hard</button>
                        <button class="admin-lb-tab" data-admin-lb="special">Special</button>
                    </div>
                    <div id="admin-lb-entries"></div>
                </div>
                <div id="admin-feedback-view" style="display: none;"></div>
                <button id="admin-logout-btn">Logout</button>
            </div>
        </div>
    </div>

    <script src="launcher.js"></script>
</body>
</html>
